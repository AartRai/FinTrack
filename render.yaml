services:
  # Backend (Laravel) - Define this first so frontend can link to it
  - type: web
    name: fintrack-backend
    runtime: php
    rootDirectory: backend
    buildCommand: composer install --no-dev && php artisan config:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_DSN
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false

  # Frontend (React/Vite)
  - type: web
    name: fintrack-frontend
    runtime: static
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fintrack-backend
          type: web
          property: host
