services:
  # Backend (Laravel)
  - type: web
    name: fintrack-backend
    runtime: docker
    rootDirectory: backend
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_DSN
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false

  # Frontend (React/Vite)
  - type: web
    name: fintrack-frontend
    runtime: docker
    rootDirectory: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fintrack-backend
          type: web
          property: host
